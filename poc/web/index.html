<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公众号抓取 / 本地调试台</title>
  <style>
    :root {
      --ink: #1c211d;
      --paper: #f5f1e8;
      --line: #c9c2b5;
      --leaf: #2f6249;
      --alert: #b54b32;
      --muted: #6b7069;
      --panel: #fffdf7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 52px 0 72px;
    }

    .eyebrow, label, button, .status-label, .field-note {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .eyebrow { color: var(--leaf); font-size: .75rem; font-weight: 700; }
    h1 { font-size: clamp(2.35rem, 7vw, 4.6rem); line-height: .92; margin: 16px 0; max-width: 680px; }
    .lede { color: var(--muted); font-size: 1.1rem; line-height: 1.6; max-width: 640px; margin: 0 0 34px; }

    form, #result {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 8px 8px 0 rgba(28, 33, 29, .08);
    }

    form { padding: clamp(20px, 4vw, 34px); }
    .section { padding: 20px 0; border-top: 1px solid var(--line); }
    .section:first-child { padding-top: 0; border-top: 0; }

    label { display: block; font-size: .72rem; font-weight: 700; margin-bottom: 9px; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--ink);
      border-radius: 0;
      padding: 13px 14px;
      color: var(--ink);
      background: #fff;
      font: 1rem/1.5 "SFMono-Regular", Consolas, monospace;
    }
    textarea { min-height: 320px; resize: vertical; }
    input:focus, textarea:focus { outline: 3px solid #b8d7c5; outline-offset: 2px; }
    .field-note { color: var(--muted); font-size: .68rem; line-height: 1.5; margin: 9px 0 0; }

    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    button {
      width: 100%;
      border: 0;
      padding: 16px 20px;
      color: #fff;
      background: var(--leaf);
      cursor: pointer;
      font-weight: 700;
      transition: transform .15s ease, background .15s ease;
    }
    button:hover { background: #244e3a; transform: translate(-2px, -2px); }
    button:disabled { background: #8b938c; cursor: wait; transform: none; }

    #result { display: none; margin-top: 28px; padding: 22px 24px; }
    #result.visible { display: block; }
    #result.success { border-left: 6px solid var(--leaf); }
    #result.error { border-left: 6px solid var(--alert); }
    .status-label { font-size: .7rem; font-weight: 700; color: var(--muted); }
    #result-message { margin: 8px 0 0; line-height: 1.6; white-space: pre-wrap; }
    #markdown-output { white-space: pre-wrap; word-break: break-word; }

    @media (max-width: 600px) {
      main { padding-top: 32px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Local / Article Clipper</div>
    <h1>抓一篇公众号文章，本地预览 Markdown。</h1>
    <p class="lede">输入文章链接即可抓取并转换 Markdown，结果仅在本页显示，不会写入任何后端。</p>

    <form id="clip-form" autocomplete="off">
      <section class="section">
        <label for="article-url">微信公众号文章链接</label>
        <input id="article-url" type="url" required inputmode="url" autocapitalize="off" placeholder="https://mp.weixin.qq.com/s/...">
      </section>

      <section class="section">
        <button id="submit-button" type="submit">开始抓取</button>
      </section>
    </form>

    <section id="result" aria-live="polite" aria-atomic="true">
      <div id="result-label" class="status-label"></div>
      <p id="result-message"></p>
      <textarea id="markdown-output" readonly style="display:none; margin-top:16px;"></textarea>
    </section>
  </main>

  <script>
    const form = document.getElementById("clip-form");
    const urlInput = document.getElementById("article-url");
    const submitButton = document.getElementById("submit-button");
    const result = document.getElementById("result");
    const resultLabel = document.getElementById("result-label");
    const resultMessage = document.getElementById("result-message");
    const markdownOutput = document.getElementById("markdown-output");

    function showResult(kind, label, message) {
      result.className = `visible ${kind}`;
      resultLabel.textContent = label;
      resultMessage.textContent = message;
      if (kind !== "success") markdownOutput.style.display = "none";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!urlInput.value.trim()) {
        showResult("error", "配置错误", "请输入公众号文章链接。");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "正在处理…";
      showResult("success", "处理中", "抓取文章并转换为 Markdown。");
      try {
        const response = await fetch("/api/clip", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: urlInput.value }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(`[${payload.stage || "request"}] ${payload.message || "抓取失败"}`);
        }
        markdownOutput.style.display = "block";
        markdownOutput.value = payload.markdown || "";
        showResult(
          "success",
          "已抓取",
          `${payload.title}\n${payload.source_url}\n图片：${payload.image_count} 张（保留原链接）`,
        );
      } catch (error) {
        showResult("error", "抓取失败", error.message || "请求失败，请检查本地服务和网络。");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "开始抓取";
      }
    });
  </script>
</body>
</html>
