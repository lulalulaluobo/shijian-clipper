name: wechat-clipper

services:
  pocketbase:
    image: ${POCKETBASE_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
    volumes:
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["serve", "--http=127.0.0.1:18081"]

  api:
    image: ${APP_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      POCKETBASE_URL: http://127.0.0.1:18081
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      FNS_ENCRYPTION_KEY: ${FNS_ENCRYPTION_KEY}
      WORKER_POLL_INTERVAL_SECONDS: 2
    command: ["uvicorn", "backend.app.main:app", "--host", "127.0.0.1", "--port", "18080"]
    depends_on:
      pocketbase:
        condition: service_healthy

  worker:
    image: ${APP_IMAGE}
    restart: unless-stopped
    network_mode: host
    environment:
      POCKETBASE_URL: http://127.0.0.1:18081
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      FNS_ENCRYPTION_KEY: ${FNS_ENCRYPTION_KEY}
      WORKER_POLL_INTERVAL_SECONDS: 2
    command: ["python", "-m", "backend.app.worker"]
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pocketbase_data:
